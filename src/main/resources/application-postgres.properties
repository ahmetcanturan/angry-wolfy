# --- Optional datasource: PostgreSQL ---
# Activate with: --spring.profiles.active=postgres
# (env vars below must be set: DB_URL, DB_USERNAME, DB_PASSWORD)

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/angrywolfy}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:angrywolfy}
spring.datasource.password=${DB_PASSWORD:angrywolfy}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
