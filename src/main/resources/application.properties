spring.application.name=angrywolfy

# --- Default datasource: SQLite ---
spring.datasource.url=jdbc:sqlite:data/angrywolfy.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate needs to be told explicitly how to speak SQLite's SQL dialect
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# Auto-create/update tables from the @Entity classes (fine for dev; see notes below for prod)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
