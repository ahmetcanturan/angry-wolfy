services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/data/loadtest.db
      # AI provider config (optional)
      # - AI_PROVIDER=anthropic
      # - AI_API_KEY=${AI_API_KEY}
    volumes:
      - app-data:/data
      # Mount the target codebase for AI analysis (read-only):
      # - ./my-target-project:/workspace/target-code:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

  # Optional sidecar: exposes the app to other machines (distributed workers, demos).
  # Put NGROK_AUTHTOKEN=xxxx in a .env file next to this compose file.
  ngrok:
    image: ngrok/ngrok:latest
    command: http app:8080
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"   # ngrok web inspector: see the public URL at http://localhost:4040
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - tunnel        # only starts when explicitly requested

volumes:
  app-data:
